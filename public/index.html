<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=13">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body class="app-layout">

  <!-- 移动端侧边栏遮罩 -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ── 侧边栏 ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top-bar">
      <span class="sidebar-app-name">知识库</span>
      <button class="new-conv-btn" id="global-search-btn" title="全局搜索 (Ctrl+K)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div class="sidebar-search">
      <input type="search" id="kb-search" placeholder="搜索知识库…" autocomplete="off">
    </div>
    <div class="sidebar-kbs" id="sidebar-kbs">
      <div class="no-kb-hint">加载中…</div>
    </div>

    <!-- 全局搜索覆盖层（点击 🔍 后展开） -->
    <div class="global-search-panel hidden" id="global-search-panel">
      <div class="global-search-input-wrap">
        <input type="search" id="global-search-input" placeholder="搜索所有对话内容…" autocomplete="off">
        <button class="new-conv-btn" id="global-search-close" title="关闭">✕</button>
      </div>
      <div id="global-search-results" class="global-search-results">
        <div class="no-kb-hint" style="font-size:12px;text-align:center;padding:16px 8px">输入关键词搜索…</div>
      </div>
    </div>

    <!-- 对话历史区块，选中 KB 后可见 -->
    <div class="sidebar-conv-hdr hidden" id="conv-section">
      <span>对话历史</span>
      <div style="display:flex;gap:4px">
        <button class="new-conv-btn" id="bulk-conv-btn" title="批量管理">⊞</button>
        <button class="new-conv-btn" id="new-conv-btn" title="新建对话">＋</button>
      </div>
    </div>
    <div class="sidebar-search sidebar-conv-search hidden" id="conv-search-wrap">
      <input type="search" id="conv-search" placeholder="搜索对话…" autocomplete="off">
    </div>
    <div class="sidebar-convs hidden" id="sidebar-convs"></div>
    <div class="conv-bulk-bar hidden" id="conv-bulk-bar">
      <span id="conv-selected-count" style="flex:1;font-size:12px;color:var(--muted)">已选 0 条</span>
      <button class="btn btn-danger btn-sm" id="conv-bulk-delete-btn" disabled>删除</button>
      <button class="btn btn-secondary btn-sm" id="conv-bulk-cancel-btn">取消</button>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user-row">
        <span class="sidebar-user-name" id="user-name">…</span>
        <span class="badge" id="user-role-badge"></span>
      </div>
      <div class="sidebar-footer-actions">
        <button class="sidebar-action-btn" onclick="location.href='/manage.html'" title="管理">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="sidebar-action-btn" id="change-pwd-btn" title="修改密码">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
        <button class="sidebar-action-btn theme-toggle-btn" id="theme-toggle-btn" title="切换主题">🌙</button>
        <button class="sidebar-action-btn" id="logout-btn" title="退出">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── 主区域 ── -->
  <div class="main-area">
    <div class="topbar">
      <button class="topbar-icon-btn sidebar-toggle" id="sidebar-toggle" aria-label="切换侧边栏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-kb" id="topbar-kb">选择知识库</span>
      <div class="topbar-right">
        <span class="topbar-model" id="topbar-model"></span>
        <button class="topbar-icon-btn" id="export-btn" title="导出 Markdown" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="topbar-icon-btn" id="stats-btn" title="知识库统计" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="12" width="4" height="10" rx="1"/><rect x="9" y="7" width="4" height="15" rx="1"/><rect x="16" y="2" width="4" height="20" rx="1"/></svg>
        </button>
        <button class="topbar-icon-btn" id="clear-btn" title="新对话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div id="content">
      <!-- 欢迎屏 -->
      <div id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            <line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="9" y1="12" x2="13" y2="12"/>
          </svg>
        </div>
        <h1 class="welcome-title" id="welcome-title">选择一个知识库开始提问</h1>
        <p class="welcome-sub" id="welcome-sub">从左侧选择知识库，AI 将基于其中的文档回答你的问题</p>
        <div class="welcome-hints" id="welcome-hints" style="display:none">
          <div class="welcome-hint-label">试着问一问</div>
          <div class="welcome-chips" id="welcome-chips"></div>
        </div>
      </div>

      <!-- 消息列表 -->
      <main id="messages" role="log" aria-live="polite"></main>
    </div>

    <!-- 输入区 -->
    <div id="input-area">
      <div id="input-inner">
        <div id="input-wrap">
          <textarea id="question-input" placeholder="选择知识库后输入问题，Ctrl+Enter 发送" rows="1" autocomplete="off" spellcheck="false"></textarea>
          <button id="send-btn" title="发送" aria-label="发送">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div id="status-bar">
          <span id="history-count"></span>
          <span id="thinking-indicator" class="hidden">
            <span>正在检索</span>
            <span class="dots"><span></span><span></span><span></span></span>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- 知识库统计弹层 -->
  <div id="stats-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box stats-modal-box">
      <div class="modal-header">
        <span>知识库统计</span>
        <button class="modal-close" id="stats-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6"  y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <pre id="stats-content" class="stats-content">加载中…</pre>
    </div>
  </div>

  <!-- 快捷键帮助弹层 -->
  <div id="shortcuts-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box shortcuts-modal-box">
      <div class="modal-header">
        <span>键盘快捷键</span>
        <button class="modal-close" id="shortcuts-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <table class="shortcut-table">
        <tbody>
          <tr><td>发送消息</td><td><kbd>Ctrl</kbd> + <kbd>Enter</kbd></td></tr>
          <tr><td>新建对话</td><td><kbd>N</kbd></td></tr>
          <tr><td>全局搜索</td><td><kbd>Ctrl</kbd> + <kbd>K</kbd></td></tr>
          <tr><td>搜索知识库</td><td><kbd>/</kbd></td></tr>
          <tr><td>关闭弹层</td><td><kbd>Esc</kbd></td></tr>
          <tr><td>帮助</td><td><kbd>?</kbd></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 修改密码弹层 -->
  <div id="pwd-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box pwd-modal-box">
      <div class="modal-header">
        <span>修改密码</span>
        <button class="modal-close" id="pwd-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="pwd-form-row">
        <label>当前密码</label>
        <input type="password" id="chat-pwd-current" placeholder="请输入当前密码" autocomplete="current-password">
      </div>
      <div class="pwd-form-row">
        <label>新密码</label>
        <input type="password" id="chat-pwd-new" placeholder="至少 6 位" autocomplete="new-password">
      </div>
      <div class="pwd-form-row">
        <label>确认新密码</label>
        <input type="password" id="chat-pwd-confirm" placeholder="再次输入新密码" autocomplete="new-password">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px">
        <button class="btn btn-secondary btn-sm" id="pwd-modal-cancel">取消</button>
        <button class="btn btn-primary btn-sm" id="pwd-modal-confirm">保存</button>
      </div>
    </div>
  </div>

  <!-- 会话过期提示 -->
  <div id="session-toast" class="session-toast hidden">
    <span id="session-toast-msg">⚠️ 会话将在 5 分钟后过期</span>
    <button class="btn btn-primary btn-sm" id="session-relogin-btn">重新登录</button>
  </div>

  <!-- 来源文件预览弹层 -->
  <div id="src-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box src-modal-box">
      <div class="modal-header">
        <span id="src-modal-title">来源预览</span>
        <button class="modal-close" id="src-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <pre id="src-modal-content" class="preview-content">加载中…</pre>
    </div>
  </div>

  <div id="toast" class="hidden"></div>
  <script src="chat.js"></script>
</body>
</html>

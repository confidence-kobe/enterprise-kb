<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body class="manage-layout">

  <!-- 顶栏 -->
  <header class="manage-header">
    <div class="manage-header-brand">
      <div class="manage-header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      管理控制台
    </div>
    <span class="badge" id="user-badge"></span>
    <button class="btn btn-secondary btn-sm" id="change-pwd-btn">修改密码</button>
    <button class="theme-toggle-btn" id="theme-toggle-btn" title="切换深色/浅色模式">🌙</button>
    <button class="btn btn-secondary btn-sm" onclick="location.href='/index.html'">← 返回问答</button>
    <button class="btn btn-secondary btn-sm" id="logout-btn">退出</button>
  </header>

  <!-- 内容 -->
  <div class="manage-body">
    <div class="tabs">
      <button class="tab-btn active" data-tab="kbs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        知识库
      </button>
      <button class="tab-btn" data-tab="docs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        文档
      </button>
      <button class="tab-btn" data-tab="users" id="users-tab" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        用户
      </button>
      <button class="tab-btn" data-tab="settings" id="settings-tab" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </button>
    </div>

    <!-- 知识库标签 -->
    <div class="tab-panel active" id="tab-kbs">
      <div class="section-header">
        <div class="section-title">知识库列表</div>
        <button class="btn btn-primary btn-sm" id="create-kb-btn">+ 新建知识库</button>
      </div>
      <div class="item-grid" id="kb-list">
        <div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">加载中…</div></div>
      </div>
    </div>

    <!-- 文档管理标签 -->
    <div class="tab-panel" id="tab-docs">
      <div class="section-header">
        <div>
          <div class="section-title">文档管理</div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px">选择知识库后可上传或删除文档</div>
        </div>
      </div>

      <div style="margin-bottom:16px">
        <select class="input" id="doc-kb-select" style="max-width:320px">
          <option value="">— 选择知识库 —</option>
        </select>
      </div>

      <div id="upload-area" class="hidden">
        <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" id="new-text-doc-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新建文档
          </button>
          <div style="width:1px;height:18px;background:var(--border);margin:0 2px"></div>
          <input type="search" class="input" id="doc-search" placeholder="搜索文档内容…" autocomplete="off" style="max-width:320px;font-size:13px;padding:7px 12px">
          <span id="doc-search-count" style="font-size:12px;color:var(--muted)"></span>
          <button class="btn btn-secondary btn-sm" id="reindex-btn" title="重新为所有文档建立全文检索索引">重建索引</button>
          <span id="reindex-status" style="font-size:12px;color:var(--muted)"></span>
        </div>
        <div id="doc-bulk-bar" class="doc-bulk-bar hidden">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="checkbox" id="doc-select-all">
            <span id="doc-selected-count">已选 0 项</span>
          </label>
          <button class="btn btn-danger btn-sm" id="doc-bulk-delete-btn" disabled>批量删除</button>
        </div>
        <div class="upload-zone" id="upload-zone">
          <div class="upload-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--light)">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
          <div class="upload-hint">
            <strong>点击选择文件</strong> 或拖放到此处<br>
            支持：.txt .md .pdf .ts .js .py .json .csv 等（单文件最大 50MB）
          </div>
          <input type="file" id="file-input" multiple accept=".txt,.md,.markdown,.pdf,.ts,.js,.py,.java,.go,.rs,.json,.yaml,.yml,.csv,.html,.xml,.sh,.toml" style="display:none">
        </div>
        <div id="upload-progress-wrap" class="hidden">
          <div class="upload-progress-label">
            <span id="upload-progress-text">上传中…</span>
            <span id="upload-progress-pct">0%</span>
          </div>
          <div class="upload-progress-bar-bg">
            <div class="upload-progress-bar" id="upload-progress-bar" style="width:0%"></div>
          </div>
        </div>
        <div class="item-grid" id="doc-list"></div>
      </div>
    </div>

    <!-- 用户管理标签（仅 admin） -->
    <div class="tab-panel" id="tab-users">
      <div class="section-header">
        <div class="section-title">用户管理</div>
        <button class="btn btn-primary btn-sm" id="create-user-btn">+ 新建用户</button>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="user-table">
          <thead>
            <tr>
              <th>用户名</th>
              <th>角色</th>
              <th>创建时间</th>
              <th style="width:230px">操作</th>
            </tr>
          </thead>
          <tbody id="user-list"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 系统设置标签（仅 admin） -->
  <div class="tab-panel" id="tab-settings">
    <div class="section-header">
      <div class="section-title">系统设置</div>
    </div>
    <div class="card" style="padding:20px;max-width:480px">
      <div class="form-group">
        <label class="form-label">Ollama 模型</label>
        <div style="display:flex;gap:8px">
          <select class="input" id="model-select" style="flex:1"></select>
          <button class="btn btn-primary btn-sm" id="model-save-btn">应用</button>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">
          切换后新对话立即生效，进行中的流式响应不受影响
        </div>
      </div>
    </div>
  </div>

  <!-- 新建/编辑知识库弹层 -->
  <div class="modal hidden" id="kb-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span id="kb-modal-title">新建知识库</span>
        <button class="modal-close" id="kb-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">名称 *</label>
          <input class="input" id="kb-name" placeholder="如：产品文档、技术规范">
        </div>
        <div class="form-group">
          <label class="form-label">描述（可选）</label>
          <input class="input" id="kb-desc" placeholder="简短描述知识库内容">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="kb-modal-cancel">取消</button>
        <button class="btn btn-primary" id="kb-modal-confirm">创建</button>
      </div>
      <input type="hidden" id="kb-edit-id" value="">
    </div>
  </div>

  <!-- 新建用户弹层 -->
  <div class="modal hidden" id="user-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span>新建用户</span>
        <button class="modal-close" id="user-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">用户名 *</label>
          <input class="input" id="new-username" placeholder="登录用户名">
        </div>
        <div class="form-group">
          <label class="form-label">密码 *</label>
          <input class="input" type="password" id="new-password" placeholder="初始密码">
        </div>
        <div class="form-group">
          <label class="form-label">角色</label>
          <select class="input" id="new-role">
            <option value="user">普通用户</option>
            <option value="admin">管理员</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="user-modal-cancel">取消</button>
        <button class="btn btn-primary" id="user-modal-confirm">创建</button>
      </div>
    </div>
  </div>

  <!-- 成员管理弹层 -->
  <div class="modal hidden" id="members-modal">
    <div class="modal-box" style="max-width:500px">
      <div class="modal-header">
        <span id="members-modal-title">成员管理</span>
          <button class="modal-close" id="members-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">添加成员（输入用户名）</label>
          <div style="display:flex;gap:8px">
            <input class="input" id="member-username" placeholder="用户名" style="flex:1">
            <button class="btn btn-primary btn-sm" id="member-add-btn" style="white-space:nowrap">添加</button>
          </div>
        </div>
        <div id="member-list" style="margin-top:12px;display:flex;flex-direction:column;gap:6px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="members-modal-close2">关闭</button>
      </div>
    </div>
  </div>

  <!-- 管理员重置用户密码弹层 -->
  <div class="modal hidden" id="reset-pwd-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span>重置密码 — <span id="reset-pwd-username"></span></span>
        <button class="modal-close" id="reset-pwd-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">新密码</label>
          <input class="input" type="password" id="reset-pwd-new" placeholder="至少 6 位">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">确认新密码</label>
          <input class="input" type="password" id="reset-pwd-confirm" placeholder="再次输入">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="reset-pwd-cancel">取消</button>
        <button class="btn btn-primary" id="reset-pwd-confirm-btn">重置密码</button>
      </div>
      <input type="hidden" id="reset-pwd-uid">
    </div>
  </div>

  <!-- 修改密码弹层 -->
  <div class="modal hidden" id="pwd-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span>修改密码</span>
        <button class="modal-close" id="pwd-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">当前密码</label>
          <input class="input" type="password" id="pwd-current" placeholder="当前密码">
        </div>
        <div class="form-group">
          <label class="form-label">新密码</label>
          <input class="input" type="password" id="pwd-new" placeholder="至少 6 位">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">确认新密码</label>
          <input class="input" type="password" id="pwd-confirm" placeholder="再次输入新密码">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="pwd-modal-cancel">取消</button>
        <button class="btn btn-primary" id="pwd-modal-confirm">修改密码</button>
      </div>
    </div>
  </div>

  <!-- 文档预览弹层 -->
  <div class="modal hidden" id="preview-modal">
    <div class="modal-box preview-modal-box">
      <div class="modal-header">
        <span id="preview-modal-title">文档预览</span>
        <button class="modal-close" id="preview-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body preview-modal-body">
        <div id="preview-truncated-hint" class="preview-truncated-hint hidden"></div>
        <pre id="preview-content" class="preview-content">加载中…</pre>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="preview-modal-close2">关闭</button>
      </div>
    </div>
  </div>

  <!-- 新建/编辑文本文档弹层 -->
  <div class="modal hidden" id="text-doc-modal">
    <div class="modal-box text-doc-modal-box">
      <div class="modal-header">
        <span id="text-doc-modal-title">新建文档</span>
        <button class="modal-close" id="text-doc-modal-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="text-doc-modal-body">
        <div class="text-doc-title-row">
          <input class="input" id="text-doc-title" placeholder="文档标题（如：产品FAQ、技术规范v2）" maxlength="80" autocomplete="off">
        </div>
        <div class="text-doc-editor-wrap">
          <textarea id="text-doc-content" class="text-doc-editor" placeholder="在此输入文档内容，支持 Markdown 格式…

## 示例

**加粗**、*斜体*、`代码`

- 列表项 1
- 列表项 2

支持直接粘贴从其他地方复制的内容。" spellcheck="false"></textarea>
        </div>
        <div class="text-doc-footer">
          <span id="text-doc-char-count" class="text-doc-char-count">0 字</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" id="text-doc-cancel">取消</button>
            <button class="btn btn-primary" id="text-doc-save">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              保存到知识库
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script src="manage.js"></script>
</body>
</html>

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build
        run: npm run build

      - name: Pack release tarball
        run: |
          tar -czf enterprise-kb-${{ github.ref_name }}.tar.gz \
            dist \
            public \
            packages/claude-tools-kit/dist \
            package.json \
            package-lock.json \
            README.md \
            DEPLOYMENT.md \
            RELEASE.md \
            AGENTS.md \
            SECURITY_OWNERSHIP.md \
            Dockerfile \
            docker-compose.yml \
            .env.example

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: enterprise-kb-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
